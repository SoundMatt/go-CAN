name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Cross-platform unit tests (virtual, dbc, isotp, j1939, safety) ─────────
  test:
    name: Test (${{ matrix.os }}, Go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.25", "1.26"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}

      - name: go vet
        run: go vet ./...

      - name: go test (unit + race)
        shell: bash
        run: |
          # Exclude socketcan on non-Linux (it uses Linux syscalls)
          if [ "$RUNNER_OS" = "Linux" ]; then
            go test -race -count=1 -coverprofile=coverage.out ./...
          else
            go test -race -count=1 -coverprofile=coverage.out \
              $(go list ./... | grep -v socketcan)
          fi

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.go == '1.25'
        uses: actions/upload-artifact@v6
        with:
          name: coverage
          path: coverage.out

  # ── Benchmark smoke run ───────────────────────────────────────────────────
  benchmark-smoke:
    name: Benchmark smoke (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: go test -bench (smoke, 1 iteration)
        run: >
          go test
          -bench=.
          -benchtime=1x
          -benchmem
          -run=^$
          ./virtual/...

  # ── Short fuzz run ────────────────────────────────────────────────────────
  fuzz-short:
    name: Fuzz (short, ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Clear fuzz corpus cache
        run: go clean -fuzzcache

      - name: FuzzSend (virtual)
        run: go test -fuzz=^FuzzSend$ -fuzztime=10s ./virtual/...

      - name: FuzzParse (dbc)
        run: go test -fuzz=^FuzzParse$ -fuzztime=10s ./dbc/...

  # ── SocketCAN tests (Linux only, requires vcan) ───────────────────────────
  # Uses vcan0 Linux virtual CAN interface. The test helpers skip gracefully
  # if vcan0 is not available, so CI passes even without hardware.
  test-socketcan:
    name: Test (socketcan, ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Load vcan module
        id: vcan
        run: |
          if sudo modprobe vcan 2>/dev/null && \
             sudo ip link add dev vcan0 type vcan 2>/dev/null && \
             sudo ip link set up vcan0; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::vcan0 not available — socketcan tests will skip"
          fi

      - name: go vet (socketcan)
        run: go vet ./socketcan/...

      - name: go test (socketcan, -race)
        run: go test -race -count=1 -v ./socketcan/...

  # ── go-FuSa safety checks ─────────────────────────────────────────────────
  # Pinned to v0.30.0; exits 1 on any ERROR-level finding.
  # To upgrade: install the new version locally, run 'gofusa check ./...',
  # fix all findings, then bump the @version pin below.
  gofusa:
    name: go-FuSa safety check (v0.30.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install go-FuSa
        run: go install github.com/SoundMatt/go-FuSa/cmd/gofusa@v0.30.0

      - name: gofusa check
        run: gofusa check ./...

      - name: Verify required safety artifacts are present
        run: |
          missing=0
          for f in \
            .fusa.json \
            .fusa-reqs.json \
            .fusa-iec62443.json \
            SAFETY_PLAN.md \
            SECURITY.md \
            INCIDENT-RESPONSE.md \
            THREAT_MODEL.md; do
            if [ ! -f "$f" ]; then
              echo "::error::Required safety artifact missing: $f"
              missing=$((missing + 1))
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

      - name: Verify traceability (all requirements traced AND tested)
        run: |
          gofusa trace --format json -output trace.json
          python3 - << 'PYEOF'
          import json, sys
          # A missing or unreadable trace file is a hard failure: the gate must
          # never pass silently just because the evidence could not be produced.
          with open('trace.json') as fh:
              d = json.load(fh)
          cov = d.get('coverage', {})
          total  = cov.get('totalRequirements', 0)
          traced = cov.get('tracedRequirements', 0)
          tested = cov.get('testedRequirements', 0)
          if total == 0:
              print("::error::No requirements found in trace report")
              sys.exit(1)
          failed = False
          if traced < total:
              print(f"::error::Untraced requirements: {total - traced} of {total}")
              failed = True
          if tested < total:
              # ASIL-B requirements without verification evidence fail the build.
              print(f"::error::Untested requirements: {total - tested} of {total}")
              failed = True
          if failed:
              sys.exit(1)
          print(f"Traceability OK: {total} requirements, all traced and tested")
          PYEOF

  # ── Dependency vulnerability scan ─────────────────────────────────────────
  # govulncheck fails the build on any vulnerability the code actually calls.
  govulncheck:
    name: govulncheck (dependency CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Publish machine-readable result
        if: always()
        run: govulncheck -format json ./... > vuln.json || true

      - name: Upload vuln report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vuln-report
          path: vuln.json

  # ── RELAY conformance gate ────────────────────────────────────────────────
  # Validates the go-can CLI version/capabilities/status output against the
  # authoritative RELAY §12 JSON Schemas. Pinned to the spec version go-CAN
  # targets (v1.6.x) so a spec bump is an explicit upgrade, not a surprise.
  relay-conform:
    name: RELAY conform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install relay CLI
        run: go install github.com/SoundMatt/RELAY/cmd/relay@v1.8.1

      - name: Build go-can CLI
        run: go build -o /tmp/go-can ./cmd/cantool

      - name: relay conform --strict
        run: relay conform --strict /tmp/go-can

      - name: relay compare (convert-driver self-check)
        run: relay compare /tmp/go-can /tmp/go-can

      - name: relay crossbar spoke smoke test
        run: |
          cat > /tmp/crossbar.json <<'JSON'
          {
            "spokes": [
              {"name":"a","binary":"/tmp/go-can","protocol":"CAN","subscribe_args":["--iface","virtual"],"send_args":["--iface","virtual"]},
              {"name":"b","binary":"/tmp/go-can","protocol":"CAN","subscribe_args":["--iface","virtual"],"send_args":["--iface","virtual"]}
            ],
            "routes": [{"from":"a","to":["b"]}]
          }
          JSON
          relay crossbar --config /tmp/crossbar.json --duration 2s
